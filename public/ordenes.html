<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Órdenes — Taller Motos</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>

<header class="app-header">
  <a href="/" class="brand"><span class="brand-icon">🏍️</span>Taller Motos</a>
  <nav class="nav-links">
    <a href="/" class="nav-link">Dashboard</a>
    <a href="/ordenes" class="nav-link">Órdenes</a>
    <a href="/clientes" class="nav-link">Clientes</a>
    <a href="/motos" class="nav-link">Motos</a>
    <a href="/mecanicos" class="nav-link" data-require-role="admin,recepcion">Mecánicos</a>
    <a href="/usuarios" class="nav-link" data-require-role="admin">Usuarios</a>
  </nav>
  <div class="header-right">
    <div class="user-badge">
      <span id="userDisplayName"></span>
      <span class="role-badge" id="userRoleBadge"></span>
    </div>
    <button class="btn-icon" id="btnLogout">Salir</button>
  </div>
</header>

<div class="page">
  <div class="page-header">
    <h1 class="page-title">Órdenes de Trabajo</h1>
    <button class="btn btn-primary" id="btnNuevaOT" data-require-role="admin,recepcion">+ Nueva Orden</button>
  </div>

  <!-- Filtros por estado -->
  <div class="chips" id="chipsEstado">
    <button class="chip active" data-estado="">Todas</button>
    <button class="chip" data-estado="ingresada">Ingresadas</button>
    <button class="chip" data-estado="en_diagnostico">En diagnóstico</button>
    <button class="chip" data-estado="presupuestada">Presupuestadas</button>
    <button class="chip" data-estado="aprobada">Aprobadas</button>
    <button class="chip" data-estado="en_reparacion">En reparación</button>
    <button class="chip" data-estado="esperando_repuesto">Esp. repuesto</button>
    <button class="chip" data-estado="lista">Listas</button>
    <button class="chip" data-estado="entregada">Entregadas</button>
  </div>

  <!-- Filtros de búsqueda -->
  <div class="filter-bar">
    <input type="text" id="searchQ" placeholder="Buscar patente, cliente, número de orden...">
    <select id="filtroMecanico" data-require-role="admin,recepcion">
      <option value="">Todos los mecánicos</option>
    </select>
  </div>

  <div id="listaOrdenes">
    <div class="empty-state"><div class="empty-icon">🔄</div><p>Cargando...</p></div>
  </div>
</div>

<!-- Modal Nueva OT (wizard 4 pasos) -->
<div class="modal hidden" id="modalNuevaOT">
  <div class="modal-box">
    <div class="modal-header">
      <h2 class="modal-title" id="wizardTitle">Nueva Orden</h2>
      <button class="modal-close" onclick="App.closeModal('modalNuevaOT')">✕</button>
    </div>

    <div class="wizard-steps" id="wizardDots"></div>

    <!-- Paso 1: Patente -->
    <div id="wizardStep1" class="wizard-panel">
      <div class="form-group">
        <label class="form-label required">Patente</label>
        <input type="text" id="inputPatente" class="input-uppercase"
               placeholder="Ej: ABC123"
               style="font-size:1.2rem; text-align:center; letter-spacing:4px; font-weight:700">
        <div class="text-muted mt-1" id="patenteStatus"></div>
      </div>
      <div id="motoEncontrada" class="hidden">
        <div class="card" style="padding:12px; background: #F0FDF4; border-color: #BBF7D0;">
          <div style="font-weight:700" id="motoEncontradaTitle"></div>
          <div class="text-muted text-sm" id="motoEncontradaMeta"></div>
        </div>
      </div>
      <div id="motoNuevaAlert" class="hidden">
        <div style="background: #FFF7ED; border: 1px solid #FED7AA; border-radius: 8px; padding: 12px; font-size: 0.85rem; color: #92400E;">
          Moto nueva — completá los datos en los siguientes pasos
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="App.closeModal('modalNuevaOT')">Cancelar</button>
        <button class="btn btn-primary" id="btnPaso1Siguiente">Siguiente →</button>
      </div>
    </div>

    <!-- Paso 2: Datos de la moto nueva -->
    <div id="wizardStep2" class="wizard-panel hidden">
      <div class="grid-2">
        <div class="form-group">
          <label class="form-label">Marca</label>
          <input type="text" id="newMotoMarca" class="input-uppercase" placeholder="HONDA, YAMAHA...">
        </div>
        <div class="form-group">
          <label class="form-label">Modelo</label>
          <input type="text" id="newMotoModelo" class="input-uppercase" placeholder="CB300, FZ...">
        </div>
        <div class="form-group">
          <label class="form-label">Año</label>
          <input type="number" id="newMotoAnio" inputmode="numeric" placeholder="2020" min="1950" max="2030">
        </div>
        <div class="form-group">
          <label class="form-label">Color</label>
          <input type="text" id="newMotoColor" placeholder="Rojo, Negro...">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="btnPaso2Atras">← Atrás</button>
        <button class="btn btn-primary" id="btnPaso2Siguiente">Siguiente →</button>
      </div>
    </div>

    <!-- Paso 3: Titular de la moto -->
    <div id="wizardStep3" class="wizard-panel hidden">
      <div class="form-group">
        <label class="form-label required">Titular de la moto</label>
        <div class="input-group">
          <input type="text" id="searchCliente" placeholder="Buscar por nombre o teléfono...">
          <button class="btn btn-secondary btn-sm" id="btnNuevoCliente">+ Nuevo</button>
        </div>
        <div id="clienteResults" class="hidden" style="border: 1.5px solid var(--border); border-top: none; border-radius: 0 0 8px 8px; background: #fff; max-height: 160px; overflow-y: auto;"></div>
        <div id="clienteSeleccionado" class="hidden" style="margin-top: 8px; padding: 8px 12px; background: #F0FDF4; border: 1px solid #BBF7D0; border-radius: 8px; font-size: 0.875rem; font-weight: 600;"></div>
      </div>
      <div id="formNuevoCliente" class="hidden" style="border: 1.5px solid var(--border); border-radius: 8px; padding: 14px; margin-top: 8px;">
        <div class="fw-bold text-sm mb-1">Nuevo cliente</div>
        <div class="grid-2">
          <div class="form-group">
            <label class="form-label required">Nombre</label>
            <input type="text" id="ncNombre" placeholder="Juan García">
          </div>
          <div class="form-group">
            <label class="form-label">Teléfono</label>
            <input type="tel" id="ncTelefono" placeholder="11 2345-6789">
          </div>
        </div>
        <button class="btn btn-secondary btn-sm" id="btnGuardarNuevoCliente">Guardar cliente</button>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="btnPaso3Atras">← Atrás</button>
        <button class="btn btn-primary" id="btnPaso3Siguiente">Siguiente →</button>
      </div>
    </div>

    <!-- Paso 4: Datos del ingreso -->
    <div id="wizardStep4" class="wizard-panel hidden">
      <div class="grid-2">
        <div class="form-group">
          <label class="form-label">Kilómetros</label>
          <input type="number" id="otKm" inputmode="numeric" placeholder="0" min="0">
        </div>
        <div class="form-group">
          <label class="form-label">Mecánico</label>
          <select id="otMecanico"><option value="">— Sin asignar —</option></select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label required">Problema declarado por el cliente</label>
        <textarea id="otProblema" placeholder="¿Qué le pasa a la moto según el cliente?"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Observaciones internas</label>
        <textarea id="otObservaciones" placeholder="Notas que el cliente no verá..."></textarea>
      </div>
      <div class="form-group">
        <label class="form-label required">Apuro del cliente</label>
        <div class="cedula-opciones" style="flex-wrap:wrap; gap:8px">
          <label class="cedula-opcion" style="min-width:calc(50% - 4px)">
            <input type="radio" name="otPrioridad" value="en_el_dia">
            <span>🔴 En el día</span>
          </label>
          <label class="cedula-opcion" style="min-width:calc(50% - 4px)">
            <input type="radio" name="otPrioridad" value="manana">
            <span>🟠 Mañana</span>
          </label>
          <label class="cedula-opcion" style="min-width:calc(50% - 4px)">
            <input type="radio" name="otPrioridad" value="esta_semana">
            <span>🟡 Esta semana</span>
          </label>
          <label class="cedula-opcion" style="min-width:calc(50% - 4px)">
            <input type="radio" name="otPrioridad" value="sin_apuro">
            <span>🟢 Sin apuro</span>
          </label>
          <label class="cedula-opcion" style="min-width:calc(50% - 4px)">
            <input type="radio" name="otPrioridad" value="fecha_especifica">
            <span>📅 Fecha específica</span>
          </label>
        </div>
        <div id="grupoPrioridadFecha" class="hidden" style="margin-top:10px">
          <input type="date" id="otFechaPrioridad">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Fecha prometida de entrega</label>
        <input type="date" id="otFechaPrometida">
      </div>
      <div class="form-group">
        <label class="form-label required">Cédula presentada</label>
        <div class="cedula-opciones">
          <label class="cedula-opcion" id="labelCedulaFisica">
            <input type="radio" name="otCedula" value="fisica" id="radioCedulaFisica">
            <span>🪪 Física</span>
          </label>
          <label class="cedula-opcion" id="labelCedulaDigital">
            <input type="radio" name="otCedula" value="digital" id="radioCedulaDigital">
            <span>📱 Digital</span>
          </label>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="btnPaso4Atras">← Atrás</button>
        <button class="btn btn-primary" id="btnCrearOT">Crear Orden</button>
      </div>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/app.js"></script>
<script src="/js/nueva-ot.js"></script>
<script src="/js/ordenes.js"></script>
</body>
</html>
